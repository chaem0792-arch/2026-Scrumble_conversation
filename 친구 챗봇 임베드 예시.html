<!DOCTYPE html>
<!-- saved from url=(0089)https://id-preview-%2Dcd1e13d2-fe5d-4749-9f61-a85d46a13a41.lovable.app/embed-example.html -->
<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>친구 챗봇 임베드 예시</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        background: #fdf8f3;
        color: #2a1f17;
      }
      h1 { font-size: 18px; }
      #log {
        border: 1px solid #e8d9c8;
        border-radius: 12px;
        background: #fff;
        padding: 12px;
        height: 360px;
        overflow-y: auto;
        margin-bottom: 12px;
      }
      .msg { margin: 8px 0; line-height: 1.5; }
      .me { text-align: right; color: #7a3b1f; }
      .bot { color: #2a1f17; }
      form { display: flex; gap: 8px; }
      input, select, button {
        font: inherit;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #e0c9b3;
      }
      input { flex: 1; }
      button {
        background: #c96a3d;
        color: #fff;
        border-color: #c96a3d;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: wait; }
    </style>
  </head>
  <body>
    <h1>친구 챗봇 (외부 HTML 예시)</h1>
    <label>
      친구 선택:
      <select id="persona">
        <option value="warm">🌼 지우 (따뜻한)</option>
        <option value="lively">⚡️ 하늘 (활발한)</option>
        <option value="calm">🌿 서연 (차분한)</option>
        <option value="witty">😎 도윤 (유머)</option>
      </select>
    </label>
    <div id="log"></div>
    <form id="form">
      <input id="input" placeholder="메시지를 입력하세요…" autocomplete="off">
      <button id="send" type="submit">전송</button>
    </form>

    <script>
      // 👇 자신의 Lovable 프로젝트 URL로 바꿔주세요.
      // 발행 후에는: https://project--{project-id}.lovable.app
      const API_BASE = "https://id-preview--cd1e13d2-fe5d-4749-9f61-a85d46a13a41.lovable.app";

      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const personaSel = document.getElementById("persona");
      const history = [];

      function add(role, text) {
        const div = document.createElement("div");
        div.className = "msg " + (role === "user" ? "me" : "bot");
        div.textContent = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        add("user", message);
        input.value = "";
        sendBtn.disabled = true;
        try {
          const res = await fetch(API_BASE + "/api/chat-simple", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              history,
              personaId: personaSel.value,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "요청 실패");
          add("assistant", data.reply);
          history.push({ role: "user", content: message });
          history.push({ role: "assistant", content: data.reply });
        } catch (err) {
          add("assistant", "⚠️ " + (err.message || err));
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      });
    </script>
  

</body></html>
